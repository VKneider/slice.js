<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slice.js Web Framework</title>
    <meta name="description" content="Slice.js — a lightweight web framework built on native Web Components. Build web apps one slice at a time. No build step required." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="vkneider.dev" />
    <link rel="canonical" href="https://slicejs.com" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/images/og-image.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F8F4FF" />
    <meta name="color-scheme" content="light dark" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Slice.js Web Framework" />
    <meta property="og:description" content="Slice.js — a lightweight web framework built on native Web Components. Build web apps one slice at a time. No build step required." />
    <meta property="og:url" content="https://slicejs.com" />
    <meta property="og:image" content="https://slicejs.com/images/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Slice.js Web Framework" />
    <meta name="twitter:description" content="Slice.js — a lightweight web framework built on native Web Components." />
    <meta name="twitter:image" content="https://slicejs.com/images/og-image.png" />
    <link rel="stylesheet" type="text/css" href="/App/style.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Slice.js Web Framework",
        "url": "https://slicejs.com",
        "description": "Slice.js — a lightweight web framework built on native Web Components. Build web apps one slice at a time.",
        "author": {
          "@type": "Organization",
          "name": "VKneider",
          "url": "https://github.com/VKneider"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://slicejs.com/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://slicejs.com/"
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="app">
      <script src="/App/index.js" type="module"></script>
    </div>
  </body>
</html>
